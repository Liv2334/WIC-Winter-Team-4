<!DOCTYPE html>
<html lang="en">
<head>
    <title>Connect With Us — Pop Culture Travel Guide</title>
    <link rel="icon" href="img/home-button.png">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <link href="reset.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            background-color: #080810;
            color: #e0ddf0;
            font-family: 'Lato', sans-serif;
            padding: 0;
            margin: 0;
            min-height: 100vh;
        }

        /* ── HERO ── */
        .con-hero {
            position: relative;
            padding: 140px 40px 70px;
            text-align: center;
            overflow: hidden;
        }

        .con-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 25% 60%, rgba(80, 30, 160, 0.28) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 40%, rgba(20, 80, 180, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 90%, rgba(120, 40, 180, 0.15) 0%, transparent 50%);
            pointer-events: none;
        }

        .con-hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.55) 0%, transparent 100%),
                radial-gradient(1px 1px at 25% 10%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 42% 28%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 60% 8%, rgba(255,255,255,0.45) 0%, transparent 100%),
                radial-gradient(1px 1px at 77% 20%, rgba(255,255,255,0.35) 0%, transparent 100%),
                radial-gradient(1px 1px at 90% 14%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 8% 55%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 88% 50%, rgba(255,255,255,0.35) 0%, transparent 100%);
            pointer-events: none;
        }

        .con-hero-inner {
            position: relative;
            z-index: 2;
        }

        .con-eyebrow {
            display: block;
            font-family: 'Lato', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: rgba(160, 140, 255, 0.75);
            margin-bottom: 18px;
        }

        .con-hero h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(44px, 8vw, 88px);
            font-weight: 400;
            letter-spacing: 5px;
            color: #fff;
            line-height: 0.95;
            margin-bottom: 20px;
            text-shadow:
                0 0 40px rgba(120, 70, 255, 0.5),
                0 0 100px rgba(80, 30, 200, 0.25);
        }

        .con-hero h1 em {
            font-style: normal;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255,255,255,0.45);
        }

        .con-hero-sub {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 18px;
            color: rgba(200, 185, 255, 0.6);
            letter-spacing: 1px;
            max-width: 420px;
            margin: 0 auto 36px;
        }

        .con-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            max-width: 260px;
            margin: 0 auto;
        }

        .con-divider span {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(140, 100, 255, 0.5));
        }

        .con-divider span:last-child {
            background: linear-gradient(90deg, rgba(140, 100, 255, 0.5), transparent);
        }

        .con-divider i {
            font-style: normal;
            color: rgba(160, 130, 255, 0.7);
            font-size: 13px;
        }

        /* ── FORM CARD ── */
        .con-body {
            max-width: 600px;
            margin: 56px auto 100px;
            padding: 0 24px;
        }

        .con-card {
            position: relative;
            background: rgba(255,255,255,0.025);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 56px;
            overflow: hidden;
        }

        .con-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 15%;
            right: 15%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(160, 120, 255, 0.55), transparent);
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .con-card { padding: 36px 28px; }
        }

        .con-group {
            margin-bottom: 28px;
        }

        .con-group label {
            display: block;
            font-family: 'Lato', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(170, 150, 255, 0.7);
            margin-bottom: 10px;
        }

        .con-group input,
        .con-group textarea {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 14px 18px;
            font-family: 'Lato', sans-serif;
            font-size: 15px;
            color: #e0ddf0;
            outline: none;
            transition: border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
            resize: vertical;
        }

        .con-group input::placeholder,
        .con-group textarea::placeholder {
            color: rgba(200, 185, 240, 0.22);
        }

        .con-group input:focus,
        .con-group textarea:focus {
            border-color: rgba(160, 120, 255, 0.5);
            background: rgba(140, 80, 255, 0.06);
            box-shadow: 0 0 0 3px rgba(140, 80, 255, 0.1);
        }

        .con-submit {
            width: 100%;
            margin-top: 8px;
            padding: 16px;
            font-family: 'Lato', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #fff;
            background: rgba(140, 80, 255, 0.18);
            border: 1px solid rgba(160, 120, 255, 0.35);
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.25s ease, border-color 0.25s ease, transform 0.15s ease;
        }

        .con-submit:hover {
            background: rgba(140, 80, 255, 0.32);
            border-color: rgba(180, 150, 255, 0.6);
            transform: translateY(-2px);
        }

        .con-success {
            display: none;
            margin-top: 24px;
            padding: 18px 24px;
            background: rgba(50, 200, 120, 0.07);
            border: 1px solid rgba(50, 200, 120, 0.22);
            border-radius: 8px;
            text-align: center;
            font-family: 'Lato', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(100, 220, 150, 0.85);
        }

        /* ── SCROLL REVEAL ── */
        .revealable {
            --reveal-distance: 60px;
            opacity: 0;
            transform: translateY(var(--reveal-distance));
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .active {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <ul>
            <li><a href="index.html"><button class="nav-button home-icon"><img src="img/home-button.png" alt="Home" class="nav-icon"></button></a></li>
            <li class="dropdown">
                <button class="dropbtn">Locations</button>
                <div class="dropdown-content">
                    <a href="Star_Wars.html">Star Wars</a>
                    <a href="pride_prej.html">Pride & Prejudice</a>
                    <a href="twilight.html">Twilight</a>
                    <a href="vampire_diaries.html">The Vampire Diaries</a>
                    <a href="star_trek.html">Star Trek</a>
                    <a href="hunger_games.html">The Hunger Games</a>
                    <a href="harry_potter.html">Harry Potter</a>
                </div>
            </li>
            <li><a href="map.html"><button>Map</button></a></li>
            <li><a href="connect.html"><button>Connect With Us</button></a></li>
            <li><button id="theme-button">Toggle Theme</button></li>
        </ul>
    </nav>

    <header class="con-hero">
        <div class="con-hero-inner">
            <span class="con-eyebrow">Get in Touch</span>
            <h1>Connect<br><em>With Us</em></h1>
            <p class="con-hero-sub">Suggest a franchise, share feedback, or just say hello</p>
            <div class="con-divider">
                <span></span>
                <i>✦</i>
                <span></span>
            </div>
        </div>
    </header>

    <div class="con-body revealable">
        <div class="con-card">

            <div class="con-group">
                <label for="name">Name</label>
                <input id="name" type="text" placeholder="Your name" required>
            </div>

            <div class="con-group">
                <label for="email">Email</label>
                <input id="email" type="email" placeholder="you@example.com" required>
            </div>

            <div class="con-group">
                <label for="suggestions">Movies or Shows You Want Added</label>
                <textarea id="suggestions" rows="5" placeholder="e.g. Lord of the Rings, Bridgerton, Dune..."></textarea>
            </div>

            <button class="con-submit" id="submit-btn">Send Message</button>

            <div class="con-success" id="success-msg">
                ✦ &nbsp; Message received — thank you!
            </div>

        </div>
    </div>

    <script src="index.js"></script>
    <script>
        document.getElementById('submit-btn').addEventListener('click', function () {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            if (name && email) {
                document.getElementById('success-msg').style.display = 'block';
                document.getElementById('name').value = '';
                document.getElementById('email').value = '';
                document.getElementById('suggestions').value = '';
            }
        });
    </script>

</body>
</html>
